spring:
  application:
    name: nexus

  datasource:
    url: jdbc:postgresql://localhost:5432/nexus
    username: nexus
    password: nexus

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: Nexus
    description: A real-time chat backend (Spring Boot)
    version: 1.0.0

nexus:
  ratelimit:
    enabled: true
    capacity: 5
    refill-tokens: 5
    refill-period: 1m
  jwt:
    secret: ${NEXUS_JWT_SECRET:nexus-dev-secret-change-me-please-use-a-32-byte-or-longer-secret-0123456789}
    expiration-minutes: ${NEXUS_JWT_EXPIRATION_MINUTES:60}

spring:
  application:
    name: nexus

  datasource:
    url: jdbc:postgresql://localhost:5432/nexus
    username: nexus
    password: nexus

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

server:
  port: 8084

nexus:
  jwt:
    secret: ${NEXUS_JWT_SECRET:nexus-dev-secret-change-me-please-use-a-32-byte-or-longer-secret-0123456789}
    expiration-minutes: ${NEXUS_JWT_EXPIRATION_MINUTES:60}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus — Realtime Demo Client</title>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 560px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
  h1 { font-size: 1.25rem; margin-bottom: .25rem; }
  .row { display: flex; gap: .5rem; margin: .5rem 0; align-items: center; }
  input { flex: 1; padding: .5rem; border: 1px solid #ccc; border-radius: 5px; font: inherit; }
  button { padding: .5rem .9rem; cursor: pointer; border: 1px solid #444; background: #444; color: #fff; border-radius: 5px; font: inherit; }
  button:disabled { opacity: .45; cursor: not-allowed; }
  fieldset { border: 1px solid #ddd; border-radius: 8px; margin: .75rem 0; padding: .5rem .9rem .9rem; }
  legend { font-weight: 600; font-size: .85rem; color: #555; padding: 0 .4rem; }
  #status { font-weight: 700; }
  #log { border: 1px solid #ccc; border-radius: 6px; height: 280px; overflow-y: auto; padding: .5rem; background: #fafafa; font-size: .92rem; }
  .msg { padding: .25rem .35rem; border-bottom: 1px solid #eee; }
  .who { font-weight: 700; }
  .sys { color: #999; font-style: italic; }
</style>
</head>
<body>
  <h1>Nexus — Realtime Demo Client</h1>
  <p class="sys">A test harness, not a product. Open this page in two tabs (e.g. alice and bob), connect both, and watch messages arrive live over WebSocket.</p>

  <fieldset>
    <legend>1 · Connect</legend>
    <div class="row">
      <input id="username" placeholder="username" value="alice" autocomplete="off">
      <input id="password" type="password" placeholder="password" value="Secret123!">
    </div>
    <div class="row">
      <button id="connectBtn">Log in &amp; connect</button>
      <span>Status: <span id="status">disconnected</span></span>
    </div>
  </fieldset>

  <fieldset>
    <legend>2 · Send a direct message (over REST)</legend>
    <div class="row">
      <input id="recipient" placeholder="recipient username" value="bob" autocomplete="off">
    </div>
    <div class="row">
      <input id="content" placeholder="type a message and press Send" autocomplete="off">
      <button id="sendBtn" disabled>Send</button>
    </div>
  </fieldset>

  <fieldset>
    <legend>Live feed · /user/queue/messages (over WebSocket)</legend>
    <div id="log"></div>
  </fieldset>

<script>
  const API = location.origin;
  const WS  = API.replace(/^http/, "ws") + "/ws";
  let token = null;
  let client = null;

  const $ = id => document.getElementById(id);
  const esc = s => s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  function log(html, cls) {
    const d = document.createElement("div");
    d.className = "msg" + (cls ? " " + cls : "");
    d.innerHTML = html;
    $("log").appendChild(d);
    $("log").scrollTop = $("log").scrollHeight;
  }
  const setStatus = s => $("status").textContent = s;

  async function login() {
    const res = await fetch(API + "/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: $("username").value, password: $("password").value })
    });
    if (!res.ok) throw new Error("login failed (HTTP " + res.status + ")");
    return (await res.json()).token;
  }

  function connect() {
    client = new StompJs.Client({
      brokerURL: WS,
      connectHeaders: { Authorization: "Bearer " + token },
      reconnectDelay: 5000,
      onConnect: () => {
        setStatus("connected as " + $("username").value);
        $("sendBtn").disabled = false;
        client.subscribe("/user/queue/messages", frame => {
          const m = JSON.parse(frame.body);
          log('<span class="who">' + esc(m.senderUsername) + ":</span> " + esc(m.content));
        });
        log("subscribed to /user/queue/messages", "sys");
      },
      onStompError: f => { setStatus("error"); log("STOMP error: " + (f.headers && f.headers.message), "sys"); },
      onWebSocketClose: () => { setStatus("disconnected"); $("sendBtn").disabled = true; }
    });
    client.activate();
  }

  $("connectBtn").onclick = async () => {
    try {
      setStatus("logging in…");
      if (client) { await client.deactivate(); client = null; }
      token = await login();
      connect();
    } catch (e) { setStatus("failed"); log(e.message, "sys"); }
  };

  $("sendBtn").onclick = async () => {
    const res = await fetch(API + "/api/messages/direct", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
      body: JSON.stringify({ recipientUsername: $("recipient").value, content: $("content").value })
    });
    if (!res.ok) { log("send failed (HTTP " + res.status + ")", "sys"); return; }
    $("content").value = "";
  };

  $("content").addEventListener("keydown", e => { if (e.key === "Enter" && !$("sendBtn").disabled) $("sendBtn").click(); });
</script>
</body>
</html>
